name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + shfmt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt
      - name: shfmt (format check)
        run: shfmt -d -i 2 -ci -bn rec-shell.sh install.sh uninstall.sh lib modules
      - name: shellcheck
        # Each file declares its dialect via `# shellcheck shell=...` or shebang.
        run: shellcheck rec-shell.sh install.sh uninstall.sh lib/*.sh modules/*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + zsh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats zsh
      - name: Run tests (bash + zsh)
        run: bats test/

  version-guard:
    # On a release tag, fail unless VERSION matches the tag (keeps the runtime
    # version, the tag, and the proxy's /VERSION in sync).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: VERSION must equal the tag
        run: |
          file_ver="$(tr -d ' \t\r\n' < VERSION)"
          tag_ver="${GITHUB_REF_NAME#v}"
          echo "VERSION file: $file_ver | tag: $tag_ver"
          test "$file_ver" = "$tag_ver"
